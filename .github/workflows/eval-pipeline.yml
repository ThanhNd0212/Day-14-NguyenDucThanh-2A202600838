name: AI Evaluation Pipeline

# Trigger: every push to main and every pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 — Unit tests + fast evaluation quality gate
  # Runs on every commit. Fails fast if core logic is broken.
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run all unit tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 — Benchmark evaluation quality gate
  # Runs the full 20-QA benchmark and enforces metric thresholds.
  # Blocks merge if any metric drops below acceptable level.
  # ──────────────────────────────────────────────────────────────────────────
  eval-quality-gate:
    name: Benchmark Quality Gate
    runs-on: ubuntu-latest
    needs: unit-tests   # only run if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run evaluation quality gate
        run: python ci/run_eval_gate.py
        env:
          EVAL_FAITH_MIN: "0.35"    # block deploy if faithfulness drops below this
          EVAL_RELEV_MIN: "0.35"    # block deploy if relevance drops below this
          EVAL_COMP_MIN: "0.50"     # block deploy if completeness drops below this
          EVAL_PASS_RATE_MIN: "0.05" # minimum acceptable pass rate

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: ci/eval_report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 — Regression detection against baseline
  # Compares current benchmark results to the stored baseline.
  # Alerts (but does not block) on metric drops > 0.05.
  # ──────────────────────────────────────────────────────────────────────────
  regression-check:
    name: Regression Check vs Baseline
    runs-on: ubuntu-latest
    needs: eval-quality-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run regression check
        run: python ci/run_regression_check.py
        continue-on-error: true   # alert only — do not block on regression

      - name: Post regression summary
        if: always()
        run: cat ci/regression_report.txt || echo "No regression report generated"
